name: Update Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Force a specific version (e.g. 0.2.1). Leave empty to auto-detect.'
        required: false
  schedule:
    - cron: '0 * * * *'  # check every hour

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(curl -sf https://registry.npmjs.org/@happier-dev/cli/latest | jq -r '.version')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          CURRENT=$(grep '^\s*version ' Formula/happier.rb | grep -o '[0-9.]*')
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already at v${VERSION}, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Updating from v${CURRENT} to v${VERSION}"
          fi

      - name: Fetch checksums
        if: steps.resolve.outputs.skip == 'false'
        id: checksums
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          BASE="https://github.com/happier-dev/happier/releases/download/cli-v${VERSION}"
          SUMS=$(curl -sf "${BASE}/checksums-happier-v${VERSION}.txt")
          DARWIN_ARM64=$(echo "$SUMS" | awk '/darwin-arm64/ {print $1}')
          DARWIN_X64=$(echo   "$SUMS" | awk '/darwin-x64/   {print $1}')
          LINUX_ARM64=$(echo  "$SUMS" | awk '/linux-arm64/  {print $1}')
          LINUX_X64=$(echo    "$SUMS" | awk '/linux-x64/    {print $1}')
          echo "darwin_arm64=$DARWIN_ARM64" >> "$GITHUB_OUTPUT"
          echo "darwin_x64=$DARWIN_X64"     >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$LINUX_ARM64"   >> "$GITHUB_OUTPUT"
          echo "linux_x64=$LINUX_X64"       >> "$GITHUB_OUTPUT"

      - name: Update formula
        if: steps.resolve.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          python3 - <<EOF
          import re, pathlib
          p = pathlib.Path("Formula/happier.rb")
          s = p.read_text()
          s = re.sub(r'version "[^"]+"', 'version "${VERSION}"', s, count=1)
          sums = {
            "darwin-arm64": "${{ steps.checksums.outputs.darwin_arm64 }}",
            "darwin-x64":   "${{ steps.checksums.outputs.darwin_x64 }}",
            "linux-arm64":  "${{ steps.checksums.outputs.linux_arm64 }}",
            "linux-x64":    "${{ steps.checksums.outputs.linux_x64 }}",
          }
          for platform, sha in sums.items():
            s = re.sub(
              r'(' + re.escape(platform) + r'\.tar\.gz"\s*\n\s*sha256 ")[a-f0-9]+(")',
              r'\g<1>' + sha + r'\g<2>',
              s,
            )
          p.write_text(s)
          EOF

      - name: Commit and push
        if: steps.resolve.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/happier.rb
          git commit -m "Update happier to v${{ steps.resolve.outputs.version }}"
          git push
