name: Update Formula

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel to update (latest, next, dev, or all)'
        required: false
        default: 'all'
      version:
        description: 'Force a specific version (only valid when channel is a single channel)'
        required: false
  schedule:
    - cron: '0 */3 * * *'  # check every 3 hours

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - channel: latest
            npm_tag: latest
            formula: Formula/happier.rb
          - channel: next
            npm_tag: next
            formula: Formula/happier@next.rb
          - channel: dev
            npm_tag: dev
            formula: Formula/happier@dev.rb
    steps:
      - name: Skip non-matching channel
        if: github.event.inputs.channel != '' && github.event.inputs.channel != 'all' && github.event.inputs.channel != matrix.channel
        run: |
          echo "Skipping ${{ matrix.channel }} (input requested ${{ github.event.inputs.channel }})"
          echo "SKIP=true" >> "$GITHUB_ENV"

      - name: Checkout
        if: env.SKIP != 'true'
        uses: actions/checkout@v4

      - name: Resolve version
        if: env.SKIP != 'true'
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.version }}" ] && [ "${{ github.event.inputs.channel }}" = "${{ matrix.channel }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(curl -sf "https://registry.npmjs.org/@happier-dev/cli" | jq -r '."dist-tags"."${{ matrix.npm_tag }}"')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          CURRENT=$(grep '^\s*version ' "${{ matrix.formula }}" | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "${{ matrix.channel }}: already at v${VERSION}, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "${{ matrix.channel }}: updating from v${CURRENT} to v${VERSION}"
          fi

      - name: Fetch checksums
        if: env.SKIP != 'true' && steps.resolve.outputs.skip == 'false'
        id: checksums
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          BASE="https://github.com/happier-dev/happier/releases/download/cli-v${VERSION}"
          SUMS=$(curl -sf "${BASE}/checksums-happier-v${VERSION}.txt")
          DARWIN_ARM64=$(echo "$SUMS" | awk '/darwin-arm64/ {print $1}')
          DARWIN_X64=$(echo   "$SUMS" | awk '/darwin-x64/   {print $1}')
          LINUX_ARM64=$(echo  "$SUMS" | awk '/linux-arm64/  {print $1}')
          LINUX_X64=$(echo    "$SUMS" | awk '/linux-x64/    {print $1}')
          echo "darwin_arm64=$DARWIN_ARM64" >> "$GITHUB_OUTPUT"
          echo "darwin_x64=$DARWIN_X64"     >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$LINUX_ARM64"   >> "$GITHUB_OUTPUT"
          echo "linux_x64=$LINUX_X64"       >> "$GITHUB_OUTPUT"

      - name: Update formula
        if: env.SKIP != 'true' && steps.resolve.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          FORMULA="${{ matrix.formula }}"
          python3 - <<EOF
          import re, pathlib, os
          p = pathlib.Path("${FORMULA}")
          s = p.read_text()
          s = re.sub(r'version "[^"]+"', f'version "${VERSION}"', s, count=1)
          sums = {
            "darwin-arm64": "${{ steps.checksums.outputs.darwin_arm64 }}",
            "darwin-x64":   "${{ steps.checksums.outputs.darwin_x64 }}",
            "linux-arm64":  "${{ steps.checksums.outputs.linux_arm64 }}",
            "linux-x64":    "${{ steps.checksums.outputs.linux_x64 }}",
          }
          for platform, sha in sums.items():
            s = re.sub(
              r'(' + re.escape(platform) + r'\.tar\.gz"\s*\n\s*sha256 ")[a-f0-9]+(")',
              r'\g<1>' + sha + r'\g<2>',
              s,
            )
          p.write_text(s)
          EOF

      - name: Commit and push
        if: env.SKIP != 'true' && steps.resolve.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add "${{ matrix.formula }}"
          git commit -m "Update happier (${{ matrix.channel }}) to v${{ steps.resolve.outputs.version }}"
          git push
