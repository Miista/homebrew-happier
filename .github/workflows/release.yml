name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Force a specific version (e.g. 0.2.8). Leave empty to auto-detect from npm.'
        required: false
  schedule:
    - cron: '0 * * * *'  # check npm every hour

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      skip: ${{ steps.resolve.outputs.skip }}
    steps:
      - name: Resolve version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(curl -sf https://registry.npmjs.org/@happier-dev/cli/latest | jq -r '.version')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Skip if a release for this version already exists
          if gh release view "v${VERSION}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "v${VERSION} already released, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will build v${VERSION}"
          fi

  build:
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4

      - name: Checkout happier source
        uses: actions/checkout@v4
        with:
          repository: happier-dev/happier
          token: ${{ secrets.HAPPIER_REPO_TOKEN }}
          path: happier-src

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node (for yarn)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build binaries
        run: bash scripts/build-cli.sh happier-src dist

      - name: Compute checksums
        id: checksums
        run: |
          ARM64_SHA=$(shasum -a 256 dist/happier-darwin-arm64 | awk '{print $1}')
          X64_SHA=$(shasum -a 256 dist/happier-darwin-x64 | awk '{print $1}')
          echo "arm64_sha=$ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "x64_sha=$X64_SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Automated build of @happier-dev/cli v${VERSION}" \
            dist/happier-darwin-arm64 \
            dist/happier-darwin-x64

      - name: Update cask
        run: |
          REPO="${{ github.repository }}"
          ARM64_URL="https://github.com/${REPO}/releases/download/v${VERSION}/happier-darwin-arm64"
          X64_URL="https://github.com/${REPO}/releases/download/v${VERSION}/happier-darwin-x64"
          ARM64_SHA="${{ steps.checksums.outputs.arm64_sha }}"
          X64_SHA="${{ steps.checksums.outputs.x64_sha }}"

          cat > Casks/happier.rb << EOF
          cask "happier" do
            version "${VERSION}"

            on_arm do
              url "${ARM64_URL}"
              sha256 "${ARM64_SHA}"
            end

            on_intel do
              url "${X64_URL}"
              sha256 "${X64_SHA}"
            end

            desc "Mobile and Web client for Claude Code and Codex"
            homepage "https://github.com/happier-dev/happier"

            binary "happier-darwin-arm64", target: "happier" if Hardware::CPU.arm?
            binary "happier-darwin-x64",   target: "happier" if Hardware::CPU.intel?

            zap trash: [
              "~/.happier",
              "~/.config/happier",
            ]
          end
          EOF

      - name: Commit updated cask
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/happier.rb
          git commit -m "Release v${VERSION}"
          git push
